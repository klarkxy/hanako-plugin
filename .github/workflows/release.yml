name: Publish Release

on:
  push:
    tags:
      - "release-*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, for example release-20260519-120000-000"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Resolve release tag
        id: meta
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi

          if [[ -z "$TAG" ]]; then
            echo "Release tag is required." >&2
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "release_dir=dist/releases/$TAG" >> "$GITHUB_OUTPUT"

      - name: Build release package
        run: |
          node scripts/release.mjs \
            --tag "${{ steps.meta.outputs.tag }}" \
            --out-dir "${{ steps.meta.outputs.release_dir }}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          shopt -s nullglob
          assets=("${{ steps.meta.outputs.release_dir }}"/*.zip)

          if [[ ${#assets[@]} -eq 0 ]]; then
            echo "No plugin archives were generated." >&2
            exit 1
          fi

          gh release create "${{ steps.meta.outputs.tag }}" \
            "${assets[@]}" \
            --title "${{ steps.meta.outputs.tag }}" \
            --notes-file "${{ steps.meta.outputs.release_dir }}/${{ steps.meta.outputs.tag }}.notes.md"